<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>需求处理报告 - {{DEMAND_ID}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1d1d1f;line-height:1.6;padding:20px 0}
.wrap{max-width:100%;padding:0 24px}
.head{background:#fff;padding:22px 28px;margin-bottom:12px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.head h1{font-size:20px;margin-bottom:4px}
.head .meta{color:#667085;font-size:13px}
.section{background:#fff;padding:20px 28px;margin-bottom:12px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.section h2{font-size:15px;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #4f6ef7;display:flex;align-items:center;gap:6px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f7f8fa;color:#667085;font-weight:600;font-size:12px;padding:8px 10px;text-align:left;border-bottom:2px solid #e8eaed;white-space:nowrap}
td{padding:10px;border-bottom:1px solid #f0f0f0;vertical-align:top}

.mini-table{width:100%;border:none;font-size:12px;margin:4px 0}
.mini-table td{padding:3px 6px;border:none;font-size:12px}
.mini-table tr:not(:last-child) td{border-bottom:1px dotted #eee}
.ai-cell{max-height:420px;overflow-y:auto;font-size:13px;line-height:1.8;background:#fafbfc;padding:14px 18px;border-radius:6px}
.ai-cell h3{font-size:15px;color:#4f6ef7;margin:14px 0 6px}
.ai-cell h4{font-size:14px;margin:10px 0 4px}
.ai-cell p{margin:4px 0}
.ai-cell li{margin:2px 0}
.ai-cell a{color:#4f6ef7}
.ai-cell code{background:#e8eaed;padding:1px 5px;border-radius:3px;font-size:12px}
.ai-cell table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.ai-cell td,.ai-cell th{padding:4px 8px;border:1px solid #ddd;text-align:left}
.ai-cell th{background:#f0f2f5}
.ai-cell hr{border:none;border-top:1px solid #e0e0e0;margin:12px 0}

.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;margin:2px}
.tag.ok{background:#e8f5e9;color:#2e7d32}
.tag.warn{background:#fff8e1;color:#e65100}
.tag.info{background:#e3f2fd;color:#1565c0}

.link{color:#4f6ef7;text-decoration:none;font-size:12px;display:inline-block;margin:2px 4px 2px 0}
.link:hover{text-decoration:underline}

.timeline{list-style:none}
.timeline li{padding:5px 0 5px 18px;border-left:2px solid #e0e0e0;margin-left:6px;font-size:12px}
.timeline li.done{border-left-color:#4f6ef7}
.timeline li .step{color:#98a2b3;font-size:11px}
.timeline li .sum{color:#2d3436}
</style>
</head>
<body>
<div class="wrap">

<div class="head">
<h1>{{DEMAND_TOPIC}}</h1>
<div class="meta">需求ID：{{DEMAND_ID}} | 客户：{{CUSTOMER_NAME}} | 状态：{{STATUS}} | 完成时间：{{FINISH_TIME}}</div>
</div>

<!-- 一、产品与供应商（合并表格） -->
<div class="section">
<h2>📦 产品与供应商</h2>
<table>
<tr><th style="width:30px">#</th><th style="min-width:80px">产品名</th><th style="width:70px">型号</th><th style="width:50px">数量</th><th style="min-width:160px">客户原文</th><th style="min-width:280px">产品研究结果</th><th style="min-width:140px">供应商</th><th style="width:80px">报价</th></tr>
{{PRODUCT_ROWS}}
</table>
</div>

<!-- 二、处理时间线 -->
<div class="section">
<h2>⏱ 处理时间线</h2>
<ul class="timeline">{{TIMELINE_ITEMS}}</ul>
</div>

<!-- 三、跳转链接 -->
<div class="section">
<h2>🔗 跳转链接</h2>{{LINKS}}
</div>

</div>
</body>
</html>
