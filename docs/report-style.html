<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
/* ===== WKEA 报告统一风格 ===== */
/* 所有 HTML 报告必须使用以下配色和组件样式。内容结构自由发挥，视觉风格保持一致。 */

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1d1d1f;line-height:1.7;padding:24px 0 40px}
.wrap{max-width:960px;margin:0 auto;padding:0 20px}

/* ---- 报告头部 ---- */
.head{background:linear-gradient(135deg,#4f6ef7,#6c8cff);color:#fff;padding:28px 32px;margin-bottom:16px;border-radius:10px}
.head h1{font-size:22px;font-weight:700;margin-bottom:8px}
.head .meta{font-size:13px;opacity:.85;line-height:1.8}
.head .meta span{display:inline-block;margin-right:16px}

/* ---- 内容卡片 ---- */
.section{background:#fff;padding:24px 28px;margin-bottom:14px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.section h2{font-size:16px;font-weight:700;color:#1d1d1f;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #4f6ef7;display:flex;align-items:center;gap:8px}
.section h3{font-size:14px;font-weight:600;color:#4f6ef7;margin:16px 0 8px}

/* ---- 表格 ---- */
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
th{background:#f7f8fa;color:#667085;font-weight:600;font-size:12px;padding:10px 12px;text-align:left;border-bottom:2px solid #e8eaed;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top}
tr:last-child td{border-bottom:none}

/* ---- 标签 ---- */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;margin:2px}
.tag-ok{background:#e8f5e9;color:#2e7d32}
.tag-warn{background:#fff8e1;color:#e65100}
.tag-info{background:#e3f2fd;color:#1565c0}
.tag-err{background:#ffebee;color:#c62828}

/* ---- 链接 ---- */
a{color:#4f6ef7;text-decoration:none}
a:hover{text-decoration:underline}

/* ---- 进度/时间线 ---- */
.timeline{list-style:none;padding:0}
.timeline li{padding:6px 0 6px 20px;border-left:2px solid #e0e0e0;margin-left:6px;font-size:13px;line-height:1.6}
.timeline li.done{border-left-color:#4f6ef7}
.timeline li .step{color:#98a2b3;font-size:11px;margin-right:8px}

/* ---- 信息列表 ---- */
.info-list{list-style:none;padding:0}
.info-list li{padding:6px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.info-list li:last-child{border-bottom:none}
.info-list .label{color:#667085;font-size:12px;display:inline-block;min-width:80px}

/* ---- 分隔线 ---- */
hr{border:none;border-top:1px solid #e8eaed;margin:16px 0}

/* ---- 引用/备注块 ---- */
.note{background:#fafbfc;border-left:3px solid #4f6ef7;padding:12px 16px;border-radius:4px;font-size:13px;color:#555;margin:10px 0}
.note.warn{background:#fffbf0;border-left-color:#f59e0b}

/* ---- 报告尾部 ---- */
.foot{text-align:center;color:#98a2b3;font-size:12px;padding:20px 0 0;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
<!--
  报告内容从这里开始。结构参考：
  1. .head — 标题 + 元信息（ID、时间、状态）
  2. .section — 每个内容块一个卡片
  3. .foot — 生成信息 + 免责声明

  可用组件：表格、标签(.tag-ok/.tag-warn/.tag-info/.tag-err)、时间线(.timeline)、信息列表(.info-list)、备注(.note)
-->
</div>
</body>
</html>
